<div class="body">
  <mat-card>
    <mat-card-header>
      <mat-toolbar>Gerenciador de Items</mat-toolbar>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form">
        <mat-form-field>
          <mat-label>Nome</mat-label>
          <input matInput formControlName="name">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Marca</mat-label>
          <input matInput formControlName="brand">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Preço</mat-label>
          <input matInput formControlName="price">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Descrição</mat-label>
          <textarea matInput formControlName="description"></textarea>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <button matButton="filled" (click)="onSubmit()">Salvar</button>
      <button matButton="outlined" (click)="onCancel()">Cancelar</button>
    </mat-card-actions>
  </mat-card>
</div>
