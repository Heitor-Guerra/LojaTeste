<div class="body">
<mat-card>
  <mat-card-header>
    <mat-toolbar> Itens da Loja </mat-toolbar>
  </mat-card-header>

  <mat-card-content>
      <mat-form-field>
        <mat-label>Filtro</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Garrafa" #input>
      </mat-form-field>


      <table mat-table [dataSource]="dataSource" multiTemplateDataRows matSort class="mat-elevation-z8">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome </th>
          <td mat-cell *matCellDef="let row"> {{row.name}} </td>
        </ng-container>

        <ng-container matColumnDef="brand">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Marca </th>
          <td mat-cell *matCellDef="let row"> {{row.brand}} </td>
        </ng-container>

        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Preço </th>
          <td mat-cell *matCellDef="let row"> {{row.price | currency}} </td>
        </ng-container>

        <ng-container matColumnDef="expand">
          <th mat-header-cell *matHeaderCellDef>&nbsp;</th>
          <td mat-cell *matCellDef="let row">
            <button matIconButton
                    (click)="toggle(row); $event.stopPropagation()"
                    class="example-toggle-button"
                    [class.example-toggle-button-expanded]="isExpanded(row)">
              <mat-icon>keyboard_arrow_down</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="expandedDetail">
          <td mat-cell *matCellDef="let row" [attr.colspan]="displayedColumns.length">
            <div class="example-element-detail-wrapper"
                 [class.example-element-detail-wrapper-expanded]="isExpanded(row)">
              <div class="example-element-detail">
                  {{row.description}}
              </div>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef style="text-align: center">
            <button matMiniFab (click)="onAdd()">
              <mat-icon>add</mat-icon>
            </button>
          </th>
          <td mat-cell *matCellDef="let row" style="text-align: center">
            <button matMiniFab (click)="onEdit(row)" class="buttons">
              <mat-icon>edit</mat-icon>
            </button>
            <button matMiniFab (click)="onDelete(row.id)" class="buttons">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            (click)="toggle(row)">
        </tr>
        <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr>
        <tr *matNoDataRow>
          <td colspan="5">Nenhum item se encaixa no filtro "{{input.value}}"</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]"></mat-paginator>
  </mat-card-content>
</mat-card>
</div>
