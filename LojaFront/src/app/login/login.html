<div class="login-page">
  <div class="card">
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title>Login Loja</mat-card-title>
      </mat-card-header>
      <mat-card-content>

        <form [formGroup]="formGroup">
          <mat-form-field>
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="pat@example.com">
            @if (formGroup.get("email")?.invalid) {
              <mat-error>{{errorMessage()}}</mat-error>
            }
          </mat-form-field>
          <br>
          <mat-form-field>
            <mat-label>Senha</mat-label>
            <input matInput formControlName="password" type="password" />
          </mat-form-field>
        </form>

      </mat-card-content>
      <mat-card-actions>
        <button matButton="filled" (click)="onSubmit()">Login</button>
        <button matButton="outlined" (click)="onRegister()">Registrar</button>
        <button matButton="elevated" (click)="onDelete()">Deletar</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
