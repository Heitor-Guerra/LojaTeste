services:
  mysql:
    image: mysql:latest
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: senha123
      MYSQL_DATABASE: loja
    networks:
      - spring-mysql-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build: LojaApi/.
    container_name: spring-app
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: loja
      MYSQL_ROOT_PASSWORD: senha123
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - spring-mysql-net
      - spring-angular-net

  front:
    build: LojaFront/.
    container_name: angular-app
    ports:
      - "4200:4200"
    depends_on:
      - back
    networks:
      - spring-angular-net

networks:
  spring-mysql-net:
    driver: bridge
  spring-angular-net:
    driver: bridge
